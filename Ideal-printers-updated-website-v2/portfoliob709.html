/* ===============================
   1. DOM Elements & State
   =============================== */
const tabContainer = document.getElementById("tabs-container");
const tabContentPortfolio = document.getElementById("tab-content");

/**
 * Gets the current tab ID from the URL or defaults to 'print'
 */
function getActiveTabFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("tab") || "print";
}

/* ===============================
   2. Splide Initialization Logic
   =============================== */

/**
 * Initializes all sliders found in the current tab content.
 * Using a helper ensures we don't repeat the same config 10 times.
 */
function initAllSliders() {
  // Shared configuration for standard 4-column sliders
  const standardConfig = {
    type: 'slide',
    perPage: 4,
    gap: '2rem',
    breakpoints: {
      1024: { perPage: 4, gap: '1rem' },
      768: { perPage: 2, gap: '1rem' },
      576: { perPage: 2 },
    }
  };

  // Configuration for Project sliders (3 columns)
  const projectConfig = {
    type: 'slide',
    perPage: 3,
    gap: '2rem',
    breakpoints: {
      1024: { perPage: 3, gap: '2rem' },
      768: { perPage: 1, gap: '1rem' },
      576: { perPage: 1 },
    }
  };

  // List of all possible slider IDs in your project
  const sliderSelectors = [
    { id: '#watchShopSliderImages', config: standardConfig },
    { id: '#watchShopSliderImagesTwo', config: standardConfig },
    { id: '#watchShopSliderReels', config: standardConfig },
    { id: '#watchShopSliderReelsTwo', config: standardConfig },
    { id: '#secondVisualsSection', config: standardConfig },
    { id: '#watchShopSliderProjects', config: projectConfig }
  ];

  // Loop through selectors and mount if the element exists in the DOM
  sliderSelectors.forEach(slider => {
    const el = document.querySelector(slider.id);
    if (el) {
      new Splide(slider.id, slider.config).mount();
    }
  });
}

/* ===============================
   3. Tab Management Logic
   =============================== */

/**
 * Updates the UI when a tab is changed
 */
function updateActiveTab(activeId) {
  // Update Tab Button styles
  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.toggle("active", tab.dataset.id === activeId);
  });

  // Find and inject content
  const activeTab = tabs.find(t => t.id === activeId);
  tabContentPortfolio.innerHTML = activeTab ? activeTab.content : "<p>No content available.</p>";

  // Handle Project Button visibility
  const projectBtn = document.getElementById("projectBtn");
  const hideTabs = ["fashion", "signage"];
  
  if (projectBtn) {
    projectBtn.style.display = hideTabs.includes(activeId) ? "none" : "block";
  }

  // RE-INITIALIZE SLIDERS: This is the fix. 
  // Because innerHTML destroys the old DOM, we must rebuild the sliders now.
  initAllSliders();

  // Lazy load any videos/iframes in the new content
  lazyLoadIframes();
}

/**
 * Handles the click event on a tab
 */
function handleTabClick(tabId) {
  history.pushState(null, "", `?tab=${tabId}`);
  updateActiveTab(tabId);
}

/**
 * Initial setup: creates buttons and loads default tab
 */
function initTabs() {
  const activeTabId = getActiveTabFromURL();

  tabs.forEach(tab => {
    const tabButton = document.createElement("button");
    tabButton.className = "tab";
    tabButton.textContent = tab.label;
    tabButton.dataset.id = tab.id;
    if (tab.id === activeTabId) tabButton.classList.add("active");

    tabButton.addEventListener("click", () => handleTabClick(tab.id));
    tabContainer.appendChild(tabButton);
  });

  // Run the first update
  updateActiveTab(activeTabId);
}

/* ===============================
   4. Utilities
   =============================== */

function lazyLoadIframes() {
  document.querySelectorAll("iframe.lazy-iframe").forEach(iframe => {
    const dataSrc = iframe.getAttribute("data-src");
    if (dataSrc && !iframe.src) {
      iframe.src = dataSrc;
    }
  });
}

// Start the application
document.addEventListener('DOMContentLoaded', () => {
    initTabs();
});
